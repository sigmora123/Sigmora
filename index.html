<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sigmora Pro - Trading Signals</title>
    <style>
        :root {
            --bg-primary: linear-gradient(135deg, #0a0e2b 0%, #1a1f4a 50%, #0d142a 100%);
            --glass-bg: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.12);
            --accent: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            font-size: 2.8rem;
            font-weight: 800;
            background: var(--accent);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .status-bar {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 16px 24px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 500;
            font-size: 0.95rem;
        }

        .status-live {
            color: var(--success);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .live-dot {
            width: 10px;
            height: 10px;
            background: var(--success);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 28px;
            margin-bottom: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .pair-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 24px;
            justify-content: center;
        }

        .pair-btn {
            padding: 12px 20px;
            background: transparent;
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 25px;
            color: var(--text-secondary);
            cursor: pointer;
            font-weight: 600;
            transition: all 0.25s ease;
            flex: 1;
            min-width: 110px;
            max-width: 140px;
        }

        .pair-btn:hover {
            border-color: #60a5fa;
            color: var(--text-primary);
        }

        .pair-btn.active {
            background: var(--accent);
            border-color: transparent;
            color: white;
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.3);
        }

        .chart-container {
            height: 450px;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 24px;
            background: #000;
            position: relative;
        }

        .chart-iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        .indicators-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }

        .indicator-card {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.25s ease;
        }

        .indicator-card:hover {
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .indicator-name {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 12px;
            font-weight: 500;
        }

        .indicator-value {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .indicator-signal {
            font-size: 0.85rem;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 20px;
            display: inline-block;
        }

        .signal-buy { color: var(--success); background: rgba(16, 185, 129, 0.15); }
        .signal-sell { color: var(--danger); background: rgba(239, 68, 68, 0.15); }
        .signal-neutral { color: var(--warning); background: rgba(245, 158, 11, 0.15); }

        .final-signal {
            text-align: center;
            padding: 32px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 20px;
            border: 2px solid transparent;
            margin-bottom: 24px;
        }

        .final-title {
            color: var(--text-secondary);
            margin-bottom: 16px;
            font-weight: 500;
        }

        .final-value {
            font-size: 2.8rem;
            font-weight: 800;
            margin-bottom: 20px;
        }

        .final-buy { 
            background: linear-gradient(135deg, var(--success), #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .final-sell { 
            background: linear-gradient(135deg, var(--danger), #f87171);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .final-wait { color: var(--warning); }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 16px;
        }

        .stat-item {
            text-align: center;
            padding: 20px 12px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 12px;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .scanner-section {
            background: var(--glass-bg);
            border-radius: 20px;
            padding: 28px;
            margin-top: 24px;
        }

        .scanner-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 20px;
            text-align: center;
        }

        .scanner-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 12px;
        }

        .scanner-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        @media (max-width: 1024px) {
            .container { padding: 16px; }
        }

        @media (max-width: 768px) {
            .glass-card { padding: 20px; margin-bottom: 20px; }
            .chart-container { height: 380px; }
            .pair-selector { justify-content: flex-start; }
            .indicators-grid { grid-template-columns: repeat(2, 1fr); }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 480px) {
            .indicators-grid, .stats-grid { grid-template-columns: 1fr; }
            .logo { font-size: 2.2rem; }
            .final-value { font-size: 2.2rem; }
            .status-bar { flex-direction: column; gap: 12px; text-align: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="logo">Sigmora Pro</h1>
        </div>

        <div class="status-bar">
            <div class="status-live">
                <div class="live-dot"></div>
                LIVE SIGNALS
            </div>
            <div id="updateTime">Just updated</div>
        </div>

        <div class="glass-card">
            <div class="pair-selector" id="pairSelector"></div>

            <div class="chart-container">
                <iframe class="chart-iframe" src="https://www.tradingview.com/embed/?symbol=BINANCE:BTCUSDT&interval=5&theme=dark&hide_top_toolbar=1&hide_legend=1" frameborder="0" allowfullscreen></iframe>
            </div>

            <div class="indicators-grid" id="indicators"></div>

            <div class="final-signal">
                <div class="final-title">AI Master Signal</div>
                <div class="final-value" id="masterSignal">WAIT</div>
            </div>

            <div class="stats-grid" id="stats"></div>
        </div>

        <div class="glass-card scanner-section">
            <h3 class="scanner-title">🔥 Live Scanner</h3>
            <div class="scanner-grid" id="scanner"></div>
        </div>
    </div>

    <script>
        class SigmoraFast {
            constructor() {
                this.pairs = [
                    {id: 'BTC', name: 'BTC/USDT', tv: 'BINANCE:BTCUSDT'},
                    {id: 'ETH', name: 'ETH/USDT', tv: 'BINANCE:ETHUSDT'},
                    {id: 'EUR', name: 'EUR/USD', tv: 'FX:EURUSD'},
                    {id: 'GOLD', name: 'GOLD', tv: 'TVC:GOLD'}
                ];
                this.currentPair = this.pairs[0];
                this.init();
            }

            init() {
                this.renderPairs();
                this.updateDisplay();
                this.startAutoUpdate();
            }

            renderPairs() {
                const container = document.getElementById('pairSelector');
                this.pairs.forEach((pair, i) => {
                    const btn = document.createElement('button');
                    btn.className = 'pair-btn';
                    btn.textContent = pair.name;
                    btn.onclick = () => this.changePair(i);
                    container.appendChild(btn);
                });
                container.children[0].classList.add('active');
            }

            changePair(index) {
                if (this.currentPairIndex === index) return;
                this.currentPairIndex = index;
                this.currentPair = this.pairs[index];
                
                document.querySelectorAll('.pair-btn').forEach((btn, i) => {
                    btn.classList.toggle('active', i === index);
                });
                
                // Ultra-fast chart switch
                const iframe = document.querySelector('.chart-iframe');
                iframe.src = `https://www.tradingview.com/embed/?symbol=${this.currentPair.tv}&interval=5&theme=dark&hide_top_toolbar=1&hide_legend=1`;
                
                this.updateDisplay();
            }

            startAutoUpdate() {
                setInterval(() => {
                    this.updateDisplay();
                    document.getElementById('updateTime').textContent = 'Just updated';
                    setTimeout(() => {
                        document.getElementById('updateTime').textContent = '10s ago';
                    }, 5000);
                }, 10000);
            }

            updateDisplay() {
                try {
                    const time = Date.now();
                    const seed = this.currentPair.id.length + time / 1000;
                    
                    // FAST calculations
                    const rsi = ((Math.sin(time / 5000 + seed) * 35) + 50);
                    const macd = Math.sin(time / 8000 + seed * 1.5) * 20;
                    const ma = Math.sin(time / 12000 + seed * 2) * 15;
                    
                    const indicators = {
                        rsi: {val: Math.round(rsi), sig: rsi < 40 ? 'buy' : rsi > 60 ? 'sell' : 'neutral'},
                        macd: {val: macd.toFixed(1), sig: macd > 5 ? 'buy' : macd < -5 ? 'sell' : 'neutral'},
                        ma: {val: ma > 0 ? 'BULL' : 'BEAR', sig: ma > 0 ? 'buy' : 'sell'}
                    };
                    
                    this.renderIndicators(indicators);
                    this.renderMasterSignal(indicators);
                    this.renderScanner();
                    
                } catch(e) {
                    this.renderSafeFallback();
                }
            }

            renderIndicators(indicators) {
                const container = document.getElementById('indicators');
                container.innerHTML = `
                    <div class="indicator-card">
                        <div class="indicator-name">RSI 14</div>
                        <div class="indicator-value">${indicators.rsi.val}</div>
                        <span class="indicator-signal signal-${indicators.rsi.sig}">${indicators.rsi.sig.toUpperCase()}</span>
                    </div>
                    <div class="indicator-card">
                        <div class="indicator-name">MACD</div>
                        <div class="indicator-value">${indicators.macd.val}</div>
                        <span class="indicator-signal signal-${indicators.macd.sig}">${indicators.macd.sig.toUpperCase()}</span>
                    </div>
                    <div class="indicator-card">
                        <div class="indicator-name">TREND</div>
                        <div class="indicator-value">${indicators.ma.val}</div>
                        <span class="indicator-signal signal-${indicators.ma.sig}">${indicators.ma.sig.toUpperCase()}</span>
                    </div>
                `;
            }

            renderMasterSignal(indicators) {
                const buyCount = [indicators.rsi, indicators.macd, indicators.ma].filter(i => i.sig === 'buy').length;
                const sellCount = 3 - buyCount;
                
                let signal, conf, risk;
                if (buyCount >= 2) {
                    signal = 'STRONG BUY';
                    conf = 88 + Math.floor(Math.random() * 8);
                    risk = 'LOW';
                } else if (sellCount >= 2) {
                    signal = 'STRONG SELL';
                    conf = 88 + Math.floor(Math.random() * 8);
                    risk = 'LOW';
                } else {
                    signal = 'WAIT';
                    conf = 75 + Math.floor(Math.random() * 10);
                    risk = 'MEDIUM';
                }
                
                document.getElementById('masterSignal').textContent = signal;
                document.getElementById('masterSignal').className = `final-value final-${signal.toLowerCase().replace(' ', '')}`;
                
                document.getElementById('stats').innerHTML = `
                    <div class="stat-item">
                        <div class="stat-value">${conf}%</div>
                        <div class="stat-label">Confidence</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">${risk}</div>
                        <div class="stat-label">Risk</div>
                    </div>
                `;
            }

            renderScanner() {
                const container = document.getElementById('scanner');
                container.innerHTML = '';
                
                this.pairs.forEach(pair => {
                    const strength = Math.sin(Date.now() / 15000 + pair.id.length);
                    const isBuy = strength > 0;
                    const conf = Math.floor(80 + Math.abs(strength) * 15);
                    
                    const item = document.createElement('div');
                    item.className = 'scanner-item';
                    item.innerHTML = `
                        <span>${pair.name}</span>
                        <span class="indicator-signal signal-${isBuy ? 'buy' : 'sell'}">${isBuy ? 'BUY' : 'SELL'} ${conf}%</span>
                    `;
                    container.appendChild(item);
                });
            }

            renderSafeFallback() {
                document.getElementById('masterSignal').textContent = 'WAIT';
                document.getElementById('masterSignal').className = 'final-value final-wait';
                document.getElementById('stats').innerHTML = `
                    <div class="stat-item">
                        <div class="stat-value">75%</div>
                        <div class="stat-label">Confidence</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">MEDIUM</div>
                        <div class="stat-label">Risk</div>
                    </div>
                `;
            }
        }

        // Start immediately - NO delays
        const app = new SigmoraFast();
    </script>
</body>
</html>
