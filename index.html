<!DOCTYPE html>
<html>
<head>
  <title>Sigmora</title>
  <style>
    body {
      background: linear-gradient(135deg, #0f172a, #1e3a8a);
      color: white;
      font-family: Arial;
      text-align: center;
    }

    .box {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      margin: 40px auto;
      padding: 25px;
      width: 320px;
      border-radius: 15px;
    }

    button {
      background: #00ff88;
      padding: 10px;
      border: none;
      cursor: pointer;
      margin-top: 10px;
    }

    select {
      padding: 8px;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

<h1>Sigmora</h1>
<p>Smart Trading Decision Tool</p>

<div class="box">

<select onchange="changeChart(this.value)">
  <option value="BINANCE:BTCUSDT">BTC/USDT</option>
  <option value="BINANCE:ETHUSDT">ETH/USDT</option>
  <option value="OANDA:EURUSD">EUR/USD</option>
  <option value="OANDA:XAUUSD">GOLD</option>
</select>

<div id="chart"></div>

<p id="rsi"></p>
<p id="macd"></p>
<p id="ma"></p>

<h3 id="result"></h3>
<p id="confidence"></p>
<p id="risk"></p>

<button onclick="calc()">Check Signal</button>

</div>

<script>

// chart change function
function changeChart(pair) {
  document.getElementById("chart").innerHTML =
    `<iframe src="https://s.tradingview.com/widgetembed/?symbol=${pair}&interval=5&theme=dark"
    width="300" height="300"></iframe>`;
}

// default chart
changeChart("BINANCE:BTCUSDT");

// signal logic
function calc() {
  let rsiValue = Math.floor(Math.random()*100);
  let rsi = rsiValue < 30 ? "Buy" : rsiValue > 70 ? "Sell" : "Neutral";

  let macd = Math.random() > 0.5 ? "Buy" : "Sell";
  let ma = Math.random() > 0.5 ? "Buy" : "Sell";

  document.getElementById("rsi").innerText = "RSI ("+rsiValue+"): " + rsi;
  document.getElementById("macd").innerText = "MACD: " + macd;
  document.getElementById("ma").innerText = "MA: " + ma;

  let buy = [rsi, macd, ma].filter(x => x=="Buy").length;
  let sell = [rsi, macd, ma].filter(x => x=="Sell").length;

  let result = "";
  if (buy > sell) result = "STRONG BUY";
  else if (sell > buy) result = "STRONG SELL";
  else result = "WAIT";

  document.getElementById("result").innerText = "Result: " + result;

  let confidence = Math.floor(Math.random()*30)+70;
  document.getElementById("confidence").innerText = "Confidence: " + confidence + "%";

  let risk = confidence > 80 ? "Low" : confidence > 70 ? "Medium" : "High";
  document.getElementById("risk").innerText = "Risk: " + risk;
}

</script>

</body>
</html>
