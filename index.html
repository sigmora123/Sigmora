<script>
function calc() {
  let rsiValue = Math.floor(Math.random()*100);
  let rsi = rsiValue < 30 ? "Buy" : rsiValue > 70 ? "Sell" : "Neutral";

  let macd = Math.random() > 0.5 ? "Buy" : "Sell";
  let ma = Math.random() > 0.5 ? "Buy" : "Sell";

  document.getElementById("rsi").innerText = "RSI ("+rsiValue+"): " + rsi;
  document.getElementById("macd").innerText = "MACD: " + macd;
  document.getElementById("ma").innerText = "MA: " + ma;

  let buy = [rsi, macd, ma].filter(x => x=="Buy").length;
  let sell = [rsi, macd, ma].filter(x => x=="Sell").length;

  let result = "";
  if (buy > sell) result = "BUY";
  else if (sell > buy) result = "SELL";
  else result = "WAIT";

  document.getElementById("result").innerText = "Result: " + result;

  let confidence = Math.floor(Math.random()*30)+70;
  document.getElementById("confidence").innerText = "Confidence: " + confidence + "%";

  let risk = confidence > 80 ? "Low" : confidence > 70 ? "Medium" : "High";
  document.getElementById("risk").innerText = "Risk: " + risk;
}
</script>
