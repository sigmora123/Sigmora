<!DOCTYPE html>
<html>
<head>
<title>Sigmora Beauty</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  font-family: Arial;
  background: #fff0f5;
  text-align: center;
}

h1 {
  color: #e91e63;
}

.product {
  border: 1px solid #ddd;
  margin: 15px;
  padding: 15px;
  border-radius: 10px;
  background: white;
}

img {
  width: 150px;
  border-radius: 10px;
}

button {
  background: #e91e63;
  color: white;
  padding: 10px;
  border: none;
  border-radius: 5px;
  margin: 5px;
}

.qr {
  width: 120px;
  margin-top: 10px;
}
</style>
</head>

<body>

<h1>Sigmora Beauty Store</h1>
<p>Buy Trending Beauty Products</p>

<!-- PRODUCT 1 -->
<div class="product">
  <img src="https://i.imgur.com/3ZQ3Z4L.jpg">
  <h3>Vitamin C Serum</h3>
  <p>Price: ₹199</p>

  <!-- Payment Link -->
  <a href="https://www.instamojo.com/YOUR-LINK">
    <button>Buy Now (Pay Online)</button>
  </a>

  <p>OR Scan & Pay</p>

  <!-- QR CODE -->
  <img class="qr" src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=upi://pay?pa=YOURUPI@upi">

  <p>UPI: YOURUPI@upi</p>
</div>

<!-- PRODUCT 2 -->
<div class="product">
  <img src="https://i.imgur.com/9Z8Z8Z8.jpg">
  <h3>Face Glow Cream</h3>
  <p>Price: ₹249</p>

  <a href="https://www.instamojo.com/YOUR-LINK2">
    <button>Buy Now (Pay Online)</button>
  </a>

  <p>OR Scan & Pay</p>

  <img class="qr" src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=upi://pay?pa=YOURUPI@upi">

  <p>UPI: YOURUPI@upi</p>
</div>

</body>
</html>
