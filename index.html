<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sigmora Beauty - Premium Beauty Products</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: bold;
            background: linear-gradient(45deg, #ff6b9d, #c44569);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .tagline {
            color: #666;
            font-size: 1.1rem;
        }

        .products {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .product {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .product:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
        }

        .product img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .product h3 {
            font-size: 1.3rem;
            margin-bottom: 10px;
            color: #333;
        }

        .price {
            font-size: 1.6rem;
            font-weight: bold;
            color: #ff6b9d;
            margin-bottom: 20px;
        }

        .buy-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, #ff6b9d, #c44569);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .buy-btn:hover {
            transform: scale(1.02);
        }

        .buy-btn:active {
            transform: scale(0.98);
        }

        @media (max-width: 768px) {
            body {
                padding: 15px;
            }
            
            .logo {
                font-size: 2rem;
            }
            
            .products {
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
                gap: 20px;
            }
        }

        @media (max-width: 480px) {
            .products {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1 class="logo">Sigmora Beauty</h1>
        <p class="tagline">Premium Beauty Products | Direct UPI Payment</p>
    </div>

    <div class="products" id="products">
        <!-- Products will be loaded by JavaScript -->
    </div>

    <script>
        // Easy to edit - Add/Remove products here
        const products = [
            {
                name: "Matte Lipstick",
                price: 499,
                image: "https://images.unsplash.com/photo-1574169208507-84376144848b?w=400&h=300&fit=crop"
            },
            {
                name: "Face Serum",
                price: 899,
                image: "https://images.unsplash.com/photo-1584218769079-cd5f9fb1a3f4?w=400&h=300&fit=crop"
            },
            {
                name: "Perfume 50ml",
                price: 699,
                image: "https://images.unsplash.com/photo-1590736969950-785e5420a8fc?w=400&h=300&fit=crop"
            },
            {
                name: "Eyeshadow Palette",
                price: 1299,
                image: "https://images.unsplash.com/photo-1549844961-02860e9ee9eb?w=400&h=300&fit=crop"
            },
            {
                name: "Moisturizer Cream",
                price: 599,
                image: "https://images.unsplash.com/photo-1625772299848-361b803ffa25?w=400&h=300&fit=crop"
            },
            {
                name: "Foundation",
                price: 799,
                image: "https://images.unsplash.com/photo-1608248597781-5ee8e1cf1ee3?w=400&h=300&fit=crop"
            }
        ];

        const UPI_ID = "yourupi@paytm"; // Replace with your UPI ID

        // Load products
        document.addEventListener('DOMContentLoaded', function() {
            const container = document.getElementById('products');
            
            products.forEach(product => {
                const productDiv = document.createElement('div');
                productDiv.className = 'product';
                productDiv.innerHTML = `
                    <img src="${product.image}" alt="${product.name}" loading="lazy">
                    <h3>${product.name}</h3>
                    <div class="price">₹${product.price}</div>
                    <button class="buy-btn" onclick="buyNow('${UPI_ID}', '${product.name}', ${product.price})">
                        Buy Now
                    </button>
                `;
                container.appendChild(productDiv);
            });
        });

        // UPI Payment function
        function buyNow(upiId, productName, price) {
            const upiLink = `upi://pay?pa=${upiId}&pn=Sigmora&am=${price}&cu=INR`;
            window.open(upiLink, '_blank');
        }
    </script>
</body>
</html>
