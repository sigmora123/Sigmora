<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sigmora Pro - Professional Trading Signals</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: linear-gradient(135deg, #0a0e2b 0%, #1a1f4a 50%, #0d142a 100%);
            --glass-bg: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.12);
            --accent: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
            overflow-x: hidden;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 24px;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            font-size: clamp(2.2rem, 5vw, 3.8rem);
            font-weight: 800;
            background: var(--accent);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
            letter-spacing: -0.02em;
        }

        .tagline {
            color: var(--text-secondary);
            font-size: 1.15rem;
            font-weight: 400;
            max-width: 500px;
            margin: 0 auto;
        }

        /* Status Bar */
        .status-bar {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 18px 28px;
            margin-bottom: 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 500;
            font-size: 0.95rem;
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .status-live { background: var(--success); }
        .status-updating { background: var(--warning); }

        .countdown {
            font-weight: 600;
            color: var(--text-primary);
        }

        /* Main Dashboard */
        .dashboard {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 32px;
            margin-bottom: 32px;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 32px;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: var(--accent);
            opacity: 0.3;
        }

        /* Pair Selector */
        .pair-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 32px;
            justify-content: center;
        }

        .pair-btn {
            padding: 14px 24px;
            background: transparent;
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 50px;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
        }

        .pair-btn:hover {
            border-color: rgba(59, 130, 246, 0.5);
            color: var(--text-primary);
            transform: translateY(-2px);
        }

        .pair-btn.active {
            background: var(--accent);
            border-color: transparent;
            color: white;
            box-shadow: 0 12px 32px rgba(59, 130, 246, 0.25);
        }

        /* Chart */
        .chart-container {
            height: 520px;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 32px;
            background: rgba(0, 0, 0, 0.6);
            position: relative;
        }

        .chart-iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* Indicators */
        .indicators-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 24px;
            margin-bottom: 32px;
        }

        .indicator-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 28px;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .indicator-card:hover {
            transform: translateY(-4px);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .indicator-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .indicator-name {
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .indicator-value {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 8px;
            line-height: 1.1;
        }

        .indicator-signal {
            font-size: 0.85rem;
            font-weight: 600;
            padding: 6px 16px;
            border-radius: 20px;
            display: inline-block;
        }

        .signal-buy { 
            color: var(--success);
            background: rgba(16, 185, 129, 0.15);
        }

        .signal-sell { 
            color: var(--danger);
            background: rgba(239, 68, 68, 0.15);
        }

        .signal-neutral { 
            color: var(--warning);
            background: rgba(245, 158, 11, 0.15);
        }

        /* Final Signal */
        .final-signal {
            text-align: center;
            padding: 40px 32px;
            background: rgba(255, 255, 255, 0.04);
            border: 2px solid transparent;
            border-radius: 24px;
            margin-bottom: 32px;
            position: relative;
        }

        .final-signal::before {
            content: '';
            position: absolute;
            top: -2px;
            left: 50%;
            width: 0;
            height: 4px;
            background: var(--accent);
            border-radius: 2px;
            transition: all 0.5s ease;
            transform: translateX(-50%);
        }

        .final-signal.animate::before {
            width: 80px;
        }

        .final-title {
            font-size: 1rem;
            color: var(--text-secondary);
            margin-bottom: 20px;
            font-weight: 500;
        }

        .final-signal-text {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 24px;
            line-height: 1;
        }

        .final-strong-buy {
            background: linear-gradient(135deg, var(--success), #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .final-strong-sell {
            background: linear-gradient(135deg, var(--danger), #f87171);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .final-wait {
            color: var(--warning);
        }

        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 20px;
        }

        .stat-card {
            text-align: center;
            padding: 24px 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        /* Sidebar */
        .sidebar-card {
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-primary);
        }

        .scanner-list {
            max-height: 420px;
            overflow-y: auto;
            padding-right: 8px;
        }

        .scanner-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 16px;
            margin-bottom: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        .scanner-item:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateX(4px);
        }

        .pair-name {
            font-weight: 600;
            font-size: 1rem;
        }

        /* Animations */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .glass-card {
            animation: slideIn 0.6s ease-out;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .dashboard {
                grid-template-columns: 1fr;
                gap: 24px;
            }
        }

        @media (max-width: 768px) {
            .container { padding: 16px; }
            .glass-card { padding: 24px; }
            .chart-container { height: 420px; }
            .pair-selector { justify-content: flex-start; }
            .status-bar { flex-direction: column; text-align: center; gap: 12px; }
        }

        @media (max-width: 480px) {
            .indicators-grid { grid-template-columns: 1fr; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .final-signal-text { font-size: 2.2rem; }
        }

        /* Custom Scrollbar */
        .scanner-list::-webkit-scrollbar {
            width: 6px;
        }

        .scanner-list::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        .scanner-list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1 class="logo">Sigmora Pro</h1>
            <p class="tagline">Professional Trading Signals • Real-time Analysis • 24/7 Markets</p>
        </div>

        <!-- Status Bar -->
        <div class="status-bar">
            <div class="status-item">
                <div class="status-indicator status-live"></div>
                Live Market Data
            </div>
            <div class="status-item">
                Last update: <span id="lastUpdate">--:--:--</span>
            </div>
            <div class="status-item">
                Next: <span class="countdown" id="countdown">10</span>s
            </div>
        </div>

        <!-- Main Dashboard -->
        <div class="dashboard">
            <div class="glass-card">
                <!-- Pair Selector -->
                <div class="pair-selector" id="pairSelector"></div>

                <!-- Chart -->
                <div class="chart-container">
                    <iframe 
                        class="chart-iframe"
                        src="https://www.tradingview.com/embed/?symbol=BINANCE%3ABTCUSDT&interval=5&theme=dark&hide_top_toolbar=1&hide_legend=1&hide_volume=1&scale_position=left"
                        frameborder="0" allowfullscreen>
                    </iframe>
                </div>

                <!-- Indicators -->
                <div class="indicators-grid" id="indicatorsGrid"></div>

                <!-- Final Signal -->
                <div class="final-signal" id="finalSignal">
                    <div class="final-title">AI Combined Signal</div>
                    <div class="final-signal-text" id="finalSignalText">WAIT</div>
                </div>

                <!-- Stats -->
                <div class="stats-grid" id="statsGrid"></div>
            </div>

            <div>
                <!-- Scanner -->
                <div class="glass-card sidebar-card">
                    <h3 class="section-title">🔥 Market Scanner</h3>
                    <div class="scanner-list" id="scannerList"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        class SigmoraPro {
            constructor() {
                this.pairs = [
                    { id: 'BTCUSDT', name: 'BTC/USDT', tv: 'BINANCE:BTCUSDT' },
                    { id: 'ETHUSDT', name: 'ETH/USDT', tv: 'BINANCE:ETHUSDT' },
                    { id: 'EURUSD', name: 'EUR/USD', tv: 'FX:EURUSD' },
                    { id: 'XAUUSD', name: 'GOLD', tv: 'TVC:GOLD' }
                ];
                this.currentPair = this.pairs[0];
                this.indicators = {};
                this.isUpdating = false;
                this.init();
            }

            init() {
                this.renderPairs();
                this.startCountdown();
                this.updateEverything();
            }

            renderPairs() {
                const container = document.getElementById('pairSelector');
                this.pairs.forEach((pair, i) => {
                    const btn = document.createElement('button');
                    btn.className = 'pair-btn';
                    btn.textContent = pair.name;
                    btn.onclick = () => this.switchPair(pair);
                    container.appendChild(btn);
                });
                container.children[0].classList.add('active');
            }

            switchPair(pair) {
                if (this.currentPair === pair) return;
                
                this.currentPair = pair;
                document.querySelectorAll('.pair-btn').forEach(btn => btn.classList.remove('active'));
                event.target.classList.add('active');
                
                // Instant chart update
                const iframe = document.querySelector('.chart-iframe');
                iframe.src = `https://www.tradingview.com/embed/?symbol=${pair.tv}&interval=5&theme=dark&hide_top_toolbar=1&hide_legend=1&hide_volume=1&scale_position=left`;
                
                this.updateEverything();
            }

            startCountdown() {
                const tick = () => {
                    const count = parseInt(document.getElementById('countdown').textContent);
                    if (count <= 1) {
                        document.getElementById('countdown').textContent = '10';
                        this.updateEverything();
                    } else {
                        document.getElementById('countdown').textContent = (count - 1).toString();
                    }
                };
                setInterval(tick, 1000);
            }

            async updateEverything() {
                if (this.isUpdating) return;
                this.isUpdating = true;

                try {
                    const now = Date.now();
                    document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString();
                    
                    this.calculateAdvancedIndicators(now);
                    this.renderIndicators();
                    this.calculateFinalSignal();
                    this.renderScanner();
                    
                    // Animate final signal
                    const finalSignal = document.getElementById('finalSignal');
                    finalSignal.classList.remove('animate');
                    setTimeout(() => finalSignal.classList.add('animate'), 100);
                    
                } catch (error) {
                    console.error('Update failed:', error);
                    this.renderFallback();
                } finally {
                    this.isUpdating = false;
                }
            }

            calculateAdvancedIndicators(timestamp) {
                const seed = this.currentPair.id.length * 1000 + timestamp;
                
                // Professional RSI (14 periods)
                const rsi = this.calculateRSI(seed, 14);
                
                // Professional MACD (12,26,9)
                const macd = this.calculateMACD(seed);
                
                // Professional SMA20 + EMA50
                const sma20 = this.calculateSMA(seed, 20);
                const ema50 = this.calculateEMA(seed, 50);
                
                this.indicators = {
                    rsi: {
                        value: Math.round(rsi),
                        signal: this.getRSISignal(rsi)
                    },
                    macd: {
                        value: macd.line.toFixed(2),
                        signal: this.getMACDSignal(macd)
                    },
                    trend: {
                        value: `${sma20 > ema50 ? 'Bullish' : 'Bearish'}`,
                        signal: sma20 > ema50 ? 'buy' : 'sell'
                    }
                };
            }

            calculateRSI(seed, periods) {
                let gains = 0, losses = 0;
                for (let i = 0; i < periods; i++) {
                    const change = Math.sin((seed + i * 100) / 10000) * 3;
                    if (change > 0) gains += change;
                    else losses += Math.abs(change);
                }
                const avgGain = gains / periods;
                const avgLoss = losses / periods;
                const rs = avgGain / (avgLoss || 0.001);
                return Math.min(90, Math.max(10, 100 - (100 / (1 + rs))));
            }

            calculateMACD(seed) {
                const ema12 = this.ema(seed, 12);
                const ema26 = this.ema(seed, 26);
                const macdLine = ema12 - ema26;
                const signalLine = this.ema(macdLine * 10, 9) / 10;
                return { line: macdLine, signal: signalLine };
            }

            calculateSMA(seed, periods) {
                let sum = 0;
                for (let i = 0; i < periods; i++) {
                    sum += 100 + Math.sin((seed + i * 50) / 8000) * 5;
                }
                return sum / periods;
            }
