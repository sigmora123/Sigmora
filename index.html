<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sigmora Lite - Live Trading Signals</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-chart-financial@0.2.1/dist/chartjs-chart-financial.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0c0c1a 0%, #1a1a2e 50%, #16213e 100%);
            color: #ffffff;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(45deg, #00d4ff, #5b8bf5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .pair-selector {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        select, button {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        select:hover, button:hover {
            background: rgba(255,255,255,0.2);
            border-color: #00d4ff;
        }

        .price-display {
            font-size: 28px;
            font-weight: bold;
            color: #00ff88;
            text-shadow: 0 0 10px rgba(0,255,136,0.5);
        }

        .price-change {
            font-size: 14px;
            margin-left: 10px;
        }

        .chart-container {
            flex: 1;
            position: relative;
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .timeframe-buttons {
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            gap: 5px;
            z-index: 10;
        }

        .timeframe-btn.active {
            background: #00d4ff !important;
            color: #000 !important;
        }

        .signals-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
            height: 140px;
        }

        .signal-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }

        .signal-main {
            grid-column: span 2;
            background: linear-gradient(135deg, rgba(0,212,255,0.2), rgba(91,139,245,0.2));
            border: 1px solid rgba(0,212,255,0.3);
        }

        .signal-title {
            font-size: 14px;
            opacity: 0.8;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .signal-value {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .strong-buy { color: #00ff88; text-shadow: 0 0 10px rgba(0,255,136,0.5); }
        .buy { color: #90ff90; }
        .sell { color: #ff9090; }
        .strong-sell { color: #ff4444; text-shadow: 0 0 10px rgba(255,68,68,0.5); }
        .wait { color: #ffeb3b; }

        .confidence-bar {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 10px;
        }

        .confidence-fill {
            height: 100%;
            transition: width 0.5s ease;
            border-radius: 4px;
        }

        .indicators-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            margin-top: 10px;
        }

        .indicator-item {
            text-align: center;
        }

        .indicator-value {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        @media (max-width: 768px) {
            .container { padding: 10px; }
            .signals-container { grid-template-columns: 1fr; height: auto; }
            .signal-main { grid-column: span 1; }
            .header { flex-direction: column; align-items: flex-start; gap: 15px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">⚡ Sigmora Lite</div>
            <div style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
                <div class="pair-selector">
                    <select id="pairSelect">
                        <option value="BTCUSDT">BTC/USDT</option>
                        <option value="ETHUSDT">ETH/USDT</option>
                        <option value="EURUSD">EUR/USD</option>
                        <option value="USDJPY">USD/JPY</option>
                        <option value="XAUUSD">GOLD</option>
                    </select>
                    <div class="price-display" id="livePrice">-</div>
                    <div class="price-change" id="priceChange">-</div>
                </div>
                <div class="timeframe-buttons" id="timeframeButtons">
                    <button class="timeframe-btn active" data-tf="1m">1m</button>
                    <button class="timeframe-btn" data-tf="5m">5m</button>
                    <button class="timeframe-btn" data-tf="15m">15m</button>
                    <button class="timeframe-btn" data-tf="1h">1h</button>
                </div>
            </div>
        </div>

        <div class="chart-container">
            <canvas id="priceChart"></canvas>
        </div>

        <div class="signals-container">
            <div class="signal-card signal-main">
                <div class="signal-title">Trading Signal</div>
                <div class="signal-value" id="mainSignal">WAIT</div>
                <div style="display: flex; gap: 20px; margin-top: 15px; font-size: 14px;">
                    <div>
                        <div>Confidence</div>
                        <div class="confidence-bar">
                            <div class="confidence-fill" id="confidenceFill" style="width: 0%; background: #ffeb3b;"></div>
                        </div>
                        <div id="confidenceText" style="margin-top: 5px;">0%</div>
                    </div>
                    <div>
                        <div>Risk Level</div>
                        <div id="riskLevel" style="font-weight: bold; margin-top: 5px;">Medium</div>
                    </div>
                </div>
            </div>
            
            <div class="signal-card">
                <div class="signal-title">Key Indicators</div>
                <div class="indicators-grid" id="indicatorsGrid">
                    <!-- Indicators populated by JS -->
                </div>
            </div>
        </div>
    </div>

    <script>
        class SigmoraLite {
            constructor() {
                this.symbol = 'BTCUSDT';
                this.timeframe = '1m';
                this.chartData = [];
                this.chart = null;
                this.lastPrice = 0;
                this.init();
            }

            async init() {
                this.setupEventListeners();
                this.createChart();
                await this.fetchData();
                this.startAutoUpdate();
            }

            setupEventListeners() {
                document.getElementById('pairSelect').addEventListener('change', (e) => {
                    this.symbol = e.target.value;
                    this.fetchData();
                });

                document.querySelectorAll('.timeframe-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        document.querySelector('.timeframe-btn.active').classList.remove('active');
                        e.target.classList.add('active');
                        this.timeframe = e.target.dataset.tf;
                        this.fetchData();
                    });
                });
            }

            createChart() {
                const ctx = document.getElementById('priceChart').getContext('2d');
                this.chart = new Chart(ctx, {
                    type: 'candlestick',
                    data: {
                        datasets: [{
                            label: 'Price',
                            data: [],
                            borderColor: '#00d4ff',
                            backgroundColor: {
                                up: '#00ff88',
                                down: '#ff4444',
                                unchanged: '#666'
                            }
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                backgroundColor: 'rgba(0,0,0,0.8)',
                                titleColor: '#fff',
                                bodyColor: '#fff'
                            }
                        },
                        scales: {
                            x: {
                                type: 'time',
                                time: { unit: this.timeframe === '1h' ? 'hour' : 'minute' }
                            },
                            y: {
                                beginAtZero: false
                            }
                        }
                    }
                });
            }

            async fetchData() {
                try {
                    const tfMap = { '1m': '1m', '5m': '5m', '15m': '15m', '1h': '1h' };
                    const limit = this.timeframe === '1h' ? 100 : 200;
                    
                    let url;
                    if (this.symbol === 'XAUUSD') {
                        // Free forex data from freeforexapi.com
                        url = `https://freeforexapi.com/api/live?pairs=${this.symbol}&token=demo`;
                    } else {
                        // Binance API
                        url = `https://api.binance.com/api/v3/klines?symbol=${this.symbol}&interval=${tfMap[this.timeframe]}&limit=${limit}`;
                    }

                    const response = await fetch(url);
                    const data = await response.json();

                    let klines;
                    if (this.symbol === 'XAUUSD') {
                        // Handle forex API response format
                        klines = Object.values(data.rates || data).map(rate => {
                            const ts = Date.now() - Math.random() * 3600000;
                            return [ts, rate.bid || rate.rate, rate.ask || rate.rate, rate.ask || rate.rate, rate.bid || rate.rate, 1000];
                        });
                    } else {
                        klines = data.map(kline => ({
                            x: kline[0],
                            o: parseFloat(kline[1]),
                            h: parseFloat(kline[2]),
                            l: parseFloat(kline[3]),
                            c: parseFloat(kline[4]),
                            v: parseFloat(kline[5])
                        }));
                    }

                    this.chartData = klines.slice(-100);
                    this.updateChart();
                    this.calculateIndicators();
                    this.updatePriceDisplay();

                } catch (error) {
                    console.error('Data fetch error:', error);
                    // Fallback to BTCUSDT if other pairs fail
                    if (this.symbol !== 'BTCUSDT') {
                        this.symbol = 'BTCUSDT';
                        document.getElementById('pairSelect').value = 'BTCUSDT';
                        this.fetchData();
                    }
                }
            }

            updateChart() {
                this.chart.data.datasets[0].data = this.chartData;
                this.chart.update('none');
            }

            updatePriceDisplay() {
                if (this.chartData.length > 0) {
                    const currentPrice = this.chartData[this.chartData.length - 1].c;
                    const prevPrice = this.chartData[this.chartData.length - 2]?.c || currentPrice;
                    const change = ((currentPrice - prevPrice) / prevPrice) * 100;
                    
                    document.getElementById('livePrice').textContent = `$${currentPrice.toFixed(4)}`;
                    const changeEl = document.getElementById('priceChange');
                    changeEl.textContent = `${change >= 0 ? '+' : ''}${change.toFixed(2)}%`;
                    changeEl.style.color = change >= 0 ? '#00ff88' : '#ff4444';
                }
            }

            calculateIndicators() {
                const prices = this.chartData.map(d => d.c);
                const rsi = this.calculateRSI(prices, 14);
                const macd = this.calculateMACD(prices);
                const ema9 = this.calculateEMA(prices, 9);
                const ema21 = this.calculateEMA(prices, 21);
                const sma50 = this.calculateSMA(prices, 50);

                const indicators = {
                    rsi: rsi[rsi.length - 1],
                    macd: macd.macd[macd.macd.length - 1],
                    macdSignal: macd.signal[macd.signal.length - 1],
                    emaBullish: ema9[ema9.length - 1] > ema21[ema21.length - 1],
                    priceAboveEMA: prices[prices.length - 1] > ema21[ema21.length - 1],
                    smaTrend: prices[prices.length - 1] > sma50[sma50.length - 1]
                };

                this.generateSignal(indicators);
                this.updateIndicatorsDisplay(indicators);
            }

            calculateRSI(prices, period) {
                const gains = [];
                const losses = [];
                
                for (let i = 1; i < prices.length; i++) {
                    const change = prices[i] - prices[i - 1];
                    gains.push(change > 0 ? change : 0);
                    losses.push(change < 0 ? -change : 0);
                }
                
                const avgGain = this.simpleMovingAverage(gains.slice(-period), period);
                const avgLoss = this.simpleMovingAverage(losses.slice(-period), period);
                const rs = avgGain / avgLoss;
                return [100 - (100 / (1 + rs))];
            }

            calculateMACD(prices) {
                const ema12 = this.calculateEMA(prices, 12);
                const ema26 = this.calculateEMA(prices, 26);
                const macdLine = [];
                
                for (let i = 0; i < prices.length; i++) {
                    if (i < 26) continue;
                    macdLine.push(ema12[i] - ema26[i]);
                }
                
                const signal = this.calculateEMA(macdLine, 9);
                return { macd: macdLine, signal };
            }

            calculateEMA(prices, period) {
                const k = 2 / (period + 1);
                const ema = [];
                
                ema[0] = prices[0];
                for (let i = 1; i < prices.length; i++) {
                    ema[i] = prices[i] * k + ema[i - 1] * (1 - k);
                }
                return ema;
            }

            calculateSMA(prices, period) {
                const sma = [];
                for (let i = period - 1; i < prices.length; i++) {
                    const slice = prices.slice(i - period + 1, i + 1);
                    sma.push(slice.reduce((a, b) => a + b) / period);
                }
                return sma;
            }

            simpleMovingAverage(values, period) {
                const slice = values.slice(-period);
                return slice.reduce((a, b) => a + b) / period;
            }

            generateSignal(indicators) {
                let buySignals = 0;
                let sellSignals = 0;
                let totalSignals = 0;

                // RSI
                if (indicators.rsi < 30) { buySignals++; totalSignals++; }
                if (indicators.rsi > 70) { sellSignals++; totalSignals++; }

                // MACD
                if (indicators.macd > indicators.macdSignal) { buySignals++; totalSignals++; }
                else { sellSignals++; totalSignals++; }

                // EMA
                if (indicators.emaBullish) { buySignals++; totalSignals++; }
                else { sellSignals++; totalSignals++; }

                // Price vs EMA
                if (indicators.priceAboveEMA) { buySignals++; totalSignals++; }
                else { sellSignals++; totalSignals++; }

                // SMA Trend
                if (indicators.smaTrend) { buySignals++; totalSignals++; }
                else { sellSignals++; totalSignals++; }

                const confidence = Math.round((Math.max(buySignals, sellSignals) / totalSignals) * 100);
                
                let signal, signalClass;
                if (buySignals >= 4) {
                    signal = 'STRONG BUY';
                    signalClass = 'strong-buy';
                } else if (buySignals >= 3) {
                    signal = 'BUY';
                    signalClass = 'buy';
                } else if (sellSignals >= 4) {
                    signal = 'STRONG SELL';
                    signalClass = 'strong-sell';
                } else if (sellSignals >= 3) {
                    signal = 'SELL';
                    signalClass = 'sell';
                } else {
                    signal = 'WAIT';
                    signalClass = 'wait';
                }

                const risk = confidence > 80 ? 'Low' : confidence > 60 ? 'Medium' : 'High';

                document.getElementById('mainSignal').textContent = signal;
                document.getElementById('mainSignal').className = `signal-value ${signalClass}`;
                
                document.getElementById('confidenceFill').style.width = `${confidence}%`;
                document.getElementById('confidenceFill').style.background = buySignals > sellSignals ? '#00ff88' : '#ff4444';
                document.getElementById('confidenceText').textContent = `${confidence}%`;
                document.getElementById('riskLevel').textContent = risk;
            }

            updateIndicatorsDisplay(indicators) {
                const grid = document.getElementById('indicatorsGrid');
                grid.innerHTML = `
                    <div class="indicator-item">
                        <div class="indicator-value">${indicators.rsi?.toFixed(1) || 50}</div>
                        <div>RSI</div>
                    </div>
                    <div class="indicator-item">
                        <div clas
