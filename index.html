<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sigmora - Smart Trading Decision Tool</title>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <script src="https://s3.tradingview.com/tv.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0c0c2a 0%, #1a0033 50%, #0f0f23 100%);
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            font-size: 3rem;
            font-weight: bold;
            background: linear-gradient(45deg, #00d4ff, #ff6b9d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { filter: drop-shadow(0 0 5px #00d4ff); }
            to { filter: drop-shadow(0 0 20px #ff6b9d); }
        }

        .subtitle {
            color: #a0a0a0;
            font-size: 1.1rem;
        }

        .main-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3);
            margin-bottom: 30px;
        }

        .pair-selector {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .pair-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            background: linear-gradient(45deg, rgba(0, 212, 255, 0.2), rgba(255, 107, 157, 0.2));
            color: #fff;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            position: relative;
            overflow: hidden;
        }

        .pair-btn:hover {
            background: linear-gradient(45deg, #00d4ff, #ff6b9d);
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0, 212, 255, 0.4);
        }

        .pair-btn.active {
            background: linear-gradient(45deg, #00d4ff, #ff6b9d);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
        }

        .chart-container {
            height: 500px;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 30px;
            background: rgba(0, 0, 0, 0.3);
        }

        .timeframe-analysis {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .timeframe-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .timeframe-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
        }

        .tf-title {
            font-size: 0.9rem;
            color: #a0a0a0;
            margin-bottom: 10px;
            font-weight: 500;
        }

        .signal {
            font-size: 1.5rem;
            font-weight: bold;
            padding: 10px 20px;
            border-radius: 25px;
            margin: 10px 0;
        }

        .signal.buy { background: rgba(0, 255, 127, 0.2); color: #00ff7f; border: 2px solid rgba(0, 255, 127, 0.3); }
        .signal.sell { background: rgba(255, 69, 0, 0.2); color: #ff4500; border: 2px solid rgba(255, 69, 0, 0.3); }
        .signal.strong-buy { background: rgba(0, 255, 127, 0.4); color: #00ff7f; border: 2px solid #00ff7f; }
        .signal.strong-sell { background: rgba(255, 69, 0, 0.4); color: #ff4500; border: 2px solid #ff4500; }
        .signal.wait { background: rgba(255, 193, 7, 0.2); color: #ffc107; border: 2px solid rgba(255, 193, 7, 0.3); }

        .confidence {
            font-size: 1.1rem;
            margin-top: 10px;
        }

        .risk-badge {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-top: 5px;
        }

        .risk-low { background: rgba(0, 255, 127, 0.2); color: #00ff7f; }
        .risk-medium { background: rgba(255, 193, 7, 0.2); color: #ffc107; }
        .risk-high { background: rgba(255, 69, 0, 0.2); color: #ff4500; }

        .scanner-section, .history-section {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            padding: 30px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .section-title {
            font-size: 1.5rem;
            margin-bottom: 20px;
            text-align: center;
            background: linear-gradient(45deg, #00d4ff, #ff6b9d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .scanner-list, .history-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .scanner-item, .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            transition: all 0.3s ease;
        }

        .scanner-item:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateX(5px);
        }

        .pair-name {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .container { padding: 15px; }
            .main-card { padding: 25px; }
            .pair-selector { justify-content: center; }
            .chart-container { height: 350px; }
            .timeframe-analysis { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 480px) {
            .timeframe-analysis { grid-template-columns: 1fr; }
            .logo { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">Sigmora</div>
            <div class="subtitle">Smart Trading Decision Tool</div>
        </div>

        <div class="main-card">
            <div class="pair-selector" id="pairSelector">
                <!-- Trading pairs will be populated by JS -->
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <div>Analyzing market signals...</div>
            </div>

            <div class="chart-container" id="chartContainer">
                <!-- TradingView chart will be embedded here -->
            </div>

            <div class="timeframe-analysis" id="timeframeAnalysis">
                <!-- Timeframe signals will be populated here -->
            </div>
        </div>

        <div class="scanner-section">
            <h2 class="section-title">🔥 Best Signals</h2>
            <div class="scanner-list" id="scannerList">
                <!-- Scanner results will be populated here -->
            </div>
        </div>

        <div class="history-section">
            <h2 class="section-title">📊 Signal History</h2>
            <div class="history-list" id="historyList">
                <!-- History will be populated here -->
            </div>
        </div>
    </div>

    <script>
        class Sigmora {
            constructor() {
                this.pairs = ['BTCUSDT', 'ETHUSDT', 'EURUSD', 'XAUUSD', 'USDJPY'];
                this.selectedPair = 'BTCUSDT';
                this.timeframes = ['1m', '5m', '15m', '1h'];
                this.signals = {};
                this.history = JSON.parse(localStorage.getItem('sigmoraHistory')) || [];
                this.init();
            }

            init() {
                this.createPairSelector();
                this.loadChart();
                this.updateSignals();
                setInterval(() => this.updateSignals(), 10000); // Auto update every 10s
            }

            createPairSelector() {
                const selector = document.getElementById('pairSelector');
                this.pairs.forEach(pair => {
                    const btn = document.createElement('button');
                    btn.className = 'pair-btn';
                    btn.textContent = pair.replace('USDT', '/USDT').replace('USD', '/USD');
                    btn.onclick = () => this.selectPair(pair);
                    selector.appendChild(btn);
                });
                // Select first pair by default
                document.querySelector('.pair-btn').classList.add('active');
            }

            selectPair(pair) {
                this.selectedPair = pair;
                document.querySelectorAll('.pair-btn').forEach(btn => btn.classList.remove('active'));
                event.target.classList.add('active');
                this.loadChart();
                this.updateSignals();
            }

            async loadChart() {
                const container = document.getElementById('chartContainer');
                container.innerHTML = '';
                
                const widget = window.tvWidget = new TradingView.widget({
                    width: '100%',
                    height: '100%',
                    symbol: this.selectedPair,
                    interval: '5',
                    timezone: 'Etc/UTC',
                    theme: 'dark',
                    style: '1',
                    locale: 'en',
                    toolbar_bg: '#f1f3f6',
                    enable_publishing: false,
                    hide_top_toolbar: false,
                    hide_legend: false,
                    save_image: false,
                    container_id: 'chartContainer'
                });
            }

            async updateSignals() {
                const loading = document.getElementById('loading');
                loading.style.display = 'block';

                try {
                    // Simulate real market data with realistic calculations
                    this.calculateAllSignals();
                    this.renderTimeframeAnalysis();
                    this.updateScanner();
                    this.updateHistory();
                } finally {
                    loading.style.display = 'none';
                }
            }

            calculateAllSignals() {
                this.signals = {};
                this.pairs.forEach(pair => {
                    this.signals[pair] = {};
                    this.timeframes.forEach(tf => {
                        const signal = this.generateSignal(pair, tf);
                        this.signals[pair][tf] = signal;
                    });
                });
            }

            generateSignal(pair, timeframe) {
                // Simulate realistic technical analysis
                const base = Math.random() * 100;
                const rsi = 50 + (Math.sin(Date.now() / 10000 + pair.length) * 30);
                const macd = Math.sin(Date.now() / 15000 + pair.length * 2) * 50;
                const maTrend = Math.cos(Date.now() / 20000 + pair.length * 3) * 30;

                let strength = 0;
                let signalType = 'wait';

                // RSI Logic
                if (rsi > 70) strength -= 2;
                else if (rsi < 30) strength += 2;
                else if (rsi > 60) strength -= 1;
                else if (rsi < 40) strength += 1;

                // MACD Logic
                if (macd > 10) strength += 1.5;
                else if (macd < -10) strength -= 1.5;

                // MA Trend Logic
                if (maTrend > 5) strength += 1;
                else if (maTrend < -5) strength -= 1;

                // Determine signal
                if (strength >= 3) {
                    signalType = 'strong-buy';
                } else if (strength >= 1.5) {
                    signalType = 'buy';
                } else if (strength <= -3) {
                    signalType = 'strong-sell';
                } else if (strength <= -1.5) {
                    signalType = 'sell';
                }

                const confidence = Math.max(70, 95 - Math.abs(strength) * 5);

                return {
                    type: signalType,
                    confidence: Math.round(confidence),
                    risk: this.getRiskLevel(strength)
                };
            }

            getRiskLevel(strength) {
                if (Math.abs(strength) < 2) return 'low';
                if (Math.abs(strength) < 4) return 'medium';
                return 'high';
            }

            renderTimeframeAnalysis() {
                const container = document.getElementById('timeframeAnalysis');
                container.innerHTML = '';

                this.timeframes.forEach(tf => {
                    const signal = this.signals[this.selectedPair][tf];
                    const card = document.createElement('div');
                    card.className = 'timeframe-card';
                    card.innerHTML = `
                        <div class="tf-title">${tf.toUpperCase()}</div>
                        <div class="signal ${signal.type}">${signal.type.toUpperCase().replace('-', ' ')}</div>
                        <div class="confidence">${signal.confidence}% Confidence</div>
                        <div class="risk-badge risk-${signal.risk}">${signal.risk.toUpperCase()}</div>
                    `;
                    container.appendChild(card);
                });
            }

            updateScanner() {
                const container = document.getElementById('scannerList');
                container.innerHTML = '';

                // Get top 3 signals
                const topSignals = [];
                this.pairs.forEach(pair => {
                    const signals = Object.values(this.signals[pair]);
                    const avgStrength = signals.reduce((sum, s) => sum + (s.type.includes('buy') ? 1 : s.type.includes('sell') ? -1 : 0), 0) / signals.length;
                    const avgConfidence = signals.reduce((sum, s) => sum + s.confidence, 0) / signals.length;
                    topSignals.push({ pair, strength: avgStrength, confidence: avgConfidence, signal: signals[0] });
                });

                topSignals
                    .sort((a, b) => Math.abs(b.strength) - Math.abs(a.strength))
                    .slice(0, 5)
                    .forEach(item => {
                        const div = document.createElement('div');
                        div.className = 'scanner-item';
                        div.innerHTML = `
                            <span class="pair-name">${item.pair.replace('USDT', '/USDT')}</span>
                            <span class="signal ${item.signal.type}">${item.signal.type.toUpperCase().replace('-', ' ')} (${item.confidence}%)</span>
                        `;
                        container.appendChild(div);
                    });
            }

            updateHistory() {
                // Add current signal to history
                const currentSignal = this.signals[this.selectedPair]['1h'];
                const historyEntry = {
                    pair: this.selectedPair,
                    signal: currentSignal.type,
                    time: new Date().toLocaleTimeString(),
                    outcome: Math.random() > 0.5 ? 'WIN' : 'LOSS' // Simulated outcome
                };

                this.history.unshift(historyEntry);
                this.history = this.history.slice(0, 10); // Keep last 10
                localStorage.setItem('sigmoraHistory', JSON.stringify(this.history));

                // Render history
                const container = document.getElementById('historyList');
                container.innerHTML = '';
                
                this.history.slice(0, 8).forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'history-item scanner-item';
                    div.innerHTML = `
                        <span>${item.pair.replace('USDT', '/USDT')} → ${item.signal.toUpperCase()}</span>
                        <span class="signal ${item.outcome.toLowerCase()}">${item.outcome}</span>
                    `;
                    container.appendChild(div);
                });
            }
        }

        // Initialize when DOM is loaded
        document.addEventListener('DOMContentLoaded', () => {
            new Sigmora();
        });
    </script>
</body>
</html>
