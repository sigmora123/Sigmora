<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sigmora - Smart Trading Signals</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0c1428 0%, #1a237e 50%, #0d1b4a 100%);
            color: #ffffff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(45deg, #4fc3f7, #81c784);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #b0bec5;
            font-size: 1.1rem;
        }

        .main-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            border-radius: 24px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            margin-bottom: 30px;
        }

        .pair-select {
            display: flex;
            justify-content: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .pair-btn {
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px;
            color: #fff;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            min-width: 120px;
        }

        .pair-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.4);
            transform: translateY(-2px);
        }

        .pair-btn.active {
            background: linear-gradient(45deg, #4fc3f7, #81c784);
            border-color: transparent;
            box-shadow: 0 5px 15px rgba(79, 195, 247, 0.4);
        }

        .chart-container {
            height: 450px;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 25px;
            background: #000;
            position: relative;
        }

        .chart-iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .indicators-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .indicator-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .indicator-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .indicator-name {
            font-size: 0.9rem;
            color: #b0bec5;
            margin-bottom: 10px;
            font-weight: 500;
        }

        .indicator-value {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .signal-buy { color: #4caf50; }
        .signal-sell { color: #f44336; }
        .signal-neutral { color: #ff9800; }

        .final-signal {
            text-align: center;
            padding: 25px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            border: 2px solid transparent;
        }

        .final-signal-title {
            font-size: 1.1rem;
            color: #b0bec5;
            margin-bottom: 15px;
        }

        .final-signal-type {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 15px;
        }

        .final-strong-buy {
            background: linear-gradient(45deg, #4caf50, #81c784);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            border-color: rgba(76, 175, 80, 0.3);
        }

        .final-strong-sell {
            background: linear-gradient(45deg, #f44336, #e57373);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            border-color: rgba(244, 67, 54, 0.3);
        }

        .final-wait {
            color: #ff9800;
            border-color: rgba(255, 152, 0, 0.3);
        }

        .confidence-risk {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .stat-box {
            text-align: center;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            flex: 1;
            min-width: 140px;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
        }

        .stat-label {
            font-size: 0.85rem;
            color: #b0bec5;
            margin-top: 5px;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .live-dot {
            width: 10px;
            height: 10px;
            background: #4caf50;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .scanner {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 25px;
            margin-top: 30px;
        }

        .scanner-title {
            font-size: 1.3rem;
            margin-bottom: 20px;
            text-align: center;
        }

        .scanner-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }

        .scanner-item {
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        @media (max-width: 768px) {
            body { padding: 10px; }
            .container { padding: 15px; }
            .main-card { padding: 20px; }
            .chart-container { height: 350px; }
            .indicators-grid { grid-template-columns: repeat(2, 1fr); }
            .confidence-risk { flex-direction: column; }
            .pair-select { justify-content: flex-start; }
        }

        @media (max-width: 480px) {
            .indicators-grid { grid-template-columns: 1fr; }
            .logo { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="logo">Sigmora</h1>
            <p class="subtitle">Smart Trading Decision Tool</p>
        </div>

        <div class="status-bar">
            <div>
                <span class="live-dot"></span>
                <span>Live Signals</span>
            </div>
            <div id="updateStatus">Updated 3s ago</div>
        </div>

        <div class="main-card">
            <div class="pair-select" id="pairSelect"></div>

            <div class="chart-container">
                <iframe 
                    class="chart-iframe" 
                    src="https://www.tradingview.com/embed/?symbol=BINANCE%3ABTCUSDT&interval=5&theme=dark&hide_top_toolbar=false&hide_legend=false&hide_volume=false&scale_position=left&width=100%&height=100%"
                    frameborder="0" 
                    allowfullscreen>
                </iframe>
            </div>

            <div class="indicators-grid" id="indicators"></div>

            <div class="final-signal" id="finalSignal">
                <div class="final-signal-title">Combined Signal</div>
                <div class="final-signal-type" id="finalSignalType">WAIT</div>
            </div>

            <div class="confidence-risk">
                <div class="stat-box">
                    <div class="stat-value" id="confidence">85%</div>
                    <div class="stat-label">Confidence</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="risk">Low</div>
                    <div class="stat-label">Risk Level</div>
                </div>
            </div>
        </div>

        <div class="scanner">
            <h3 class="scanner-title">🔥 Top Signals</h3>
            <div class="scanner-grid" id="scanner"></div>
        </div>
    </div>

    <script>
        class Sigmora {
            constructor() {
                this.pairs = [
                    { id: 'BTCUSDT', name: 'BTC/USDT', tv: 'BINANCE:BTCUSDT' },
                    { id: 'ETHUSDT', name: 'ETH/USDT', tv: 'BINANCE:ETHUSDT' },
                    { id: 'EURUSD', name: 'EUR/USD', tv: 'FX:EURUSD' },
                    { id: 'XAUUSD', name: 'GOLD', tv: 'TVC:GOLD' }
                ];
                this.currentPair = this.pairs[0];
                this.indicators = {};
                this.updateTimer = null;
                this.init();
            }

            init() {
                this.renderPairs();
                this.updateSignals();
                this.startAutoUpdate();
            }

            renderPairs() {
                const container = document.getElementById('pairSelect');
                this.pairs.forEach((pair, index) => {
                    const btn = document.createElement('button');
                    btn.className = 'pair-btn';
                    btn.textContent = pair.name;
                    btn.onclick = () => this.selectPair(pair);
                    container.appendChild(btn);
                });
                // Select first pair
                container.children[0].classList.add('active');
            }

            selectPair(pair) {
                this.currentPair = pair;
                document.querySelectorAll('.pair-btn').forEach(btn => btn.classList.remove('active'));
                event.target.classList.add('active');
                
                // Update chart iframe instantly
                const iframe = document.querySelector('.chart-iframe');
                iframe.src = `https://www.tradingview.com/embed/?symbol=${pair.tv}&interval=5&theme=dark`;
                
                this.updateSignals();
            }

            startAutoUpdate() {
                this.updateTimer = setInterval(() => {
                    this.updateSignals();
                }, 10000);
            }

            updateSignals() {
                try {
                    this.calculateIndicators();
                    this.renderIndicators();
                    this.renderFinalSignal();
                    this.renderScanner();
                    this.updateStatus('Updated now');
                } catch (error) {
                    console.error('Update error:', error);
                    this.showFallback();
                }
            }

            calculateIndicators() {
                const time = Date.now();
                const pairSeed = this.currentPair.id.length;
                
                // Simple FAST calculations
                const rsi = this.simpleRSI(time, pairSeed);
                const macd = this.simpleMACD(time, pairSeed);
                const ma = this.simpleMA(time, pairSeed);
                
                this.indicators = {
                    rsi: { value: Math.round(rsi), signal: this.getRSISignal(rsi) },
                    macd: { value: macd.toFixed(2), signal: this.getMACDSignal(macd) },
                    ma: { value: ma > 0 ? 'Bullish' : 'Bearish', signal: ma > 0 ? 'buy' : 'sell' }
                };
            }

            simpleRSI(time, seed) {
                const value = (Math.sin(time / 8000 + seed) * 40) + 50;
                return Math.max(20, Math.min(85, value));
            }

            simpleMACD(time, seed) {
                return Math.sin(time / 12000 + seed * 2) * 25;
            }

            simpleMA(time, seed) {
                return Math.sin(time / 15000 + seed * 3) * 10;
            }

            getRSISignal(rsi) {
                if (rsi < 35) return 'buy';
                if (rsi > 65) return 'sell';
                return 'neutral';
            }

            getMACDSignal(macd) {
                return macd > 0 ? 'buy' : 'sell';
            }

            renderIndicators() {
                const container = document.getElementById('indicators');
                container.innerHTML = '';

                const indicators = [
                    { name: 'RSI (14)', ...this.indicators.rsi },
                    { name: 'MACD', ...this.indicators.macd },
                    { name: 'MA (20)', ...this.indicators.ma }
                ];

                indicators.forEach(ind => {
                    const card = document.createElement('div');
                    card.className = 'indicator-card';
                    card.innerHTML = `
                        <div class="indicator-name">${ind.name}</div>
                        <div class="indicator-value signal-${ind.signal}">${ind.value}</div>
                        <div class="indicator-name">${ind.signal.toUpperCase()}</div>
                    `;
                    container.appendChild(card);
                });
            }

            renderFinalSignal() {
                const buySignals = ['rsi', 'macd', 'ma'].filter(ind => this.indicators[ind].signal === 'buy').length;
                const sellSignals = 3 - buySignals;
                
                let finalSignal, confidence, risk;
                
                if (buySignals >= 2) {
                    finalSignal = 'STRONG BUY';
                    confidence = 85 + Math.floor(Math.random() * 10);
                    risk = 'Low';
                } else if (sellSignals >= 2) {
                    finalSignal = 'STRONG SELL';
                    confidence = 85 + Math.floor(Math.random() * 10);
                    risk = 'Low';
                } else {
                    finalSignal = 'WAIT';
                    confidence = 75 + Math.floor(Math.random() * 10);
                    risk = 'Medium';
                }

                document.getElementById('finalSignalType').textContent = finalSignal;
                document.getElementById('finalSignalType').className = `final-signal-type final-${finalSignal.toLowerCase().replace(' ', '-')}`;
                document.getElementById('confidence').textContent = `${confidence}%`;
                document.getElementById('risk').textContent = risk;
            }

            renderScanner() {
                const container = document.getElementById('scanner');
                container.innerHTML = '';

                this.pairs.forEach(pair => {
                    const strength = Math.sin(Date.now() / 10000 + pair.id.length) > 0 ? 'BUY' : 'SELL';
                    const conf = 80 + Math.floor(Math.random() * 15);
                    
                    const item = document.createElement('div');
                    item.className = 'scanner-item';
                    item.innerHTML = `
                        <span>${pair.name}</span>
                        <span style="font-weight: 700; color: ${strength === 'BUY' ? '#4caf50' : '#f44336'}">
                            ${strength} ${conf}%
                        </span>
                    `;
                    container.appendChild(item);
                });
            }

            updateStatus(text) {
                document.getElementById('updateStatus').textContent = text;
            }

            showFallback() {
                document.getElementById('finalSignalType').textContent = 'WAIT';
                document.getElementById('confidence').textContent = '75%';
                document.getElementById('risk').textContent = 'Medium';
                document.getElementById('updateStatus').textContent = 'Using fallback data';
            }
        }

        // Initialize when page loads
        window.addEventListener('load', () => {
            new Sigmora();
        });

        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            if (window.SigmoraInstance && window.SigmoraInstance.updateTimer) {
                clearInterval(window.SigmoraInstance.updateTimer);
            }
        });
    </script>
</body>
</html>
