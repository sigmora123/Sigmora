<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sigmora Lite - Live Trading Signals</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-chart-financial@0.2.1/dist/chartjs-chart-financial.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0c0c1a 0%, #1a1a2e 50%, #16213e 100%);
            color: #ffffff;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            background: linear-gradient(45deg, #00d4ff, #5b8bf5, #ff6b9d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .pair-info {
            display: flex;
            flex-direction: column;
            gap: 5px;
            min-width: 250px;
        }

        .pair-selector {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        select, button {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        select:focus, button:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 0 3px rgba(0,212,255,0.2);
        }

        select:hover, button:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-1px);
        }

        .live-price {
            font-size: 32px;
            font-weight: 700;
            margin-right: 10px;
        }

        .price-change {
            font-size: 16px;
            font-weight: 500;
            padding: 4px 12px;
            border-radius: 20px;
            background: rgba(0,0,0,0.3);
        }

        .price-up { color: #00ff88; border: 1px solid rgba(0,255,136,0.3); }
        .price-down { color: #ff4444; border: 1px solid rgba(255,68,68,0.3); }

        .chart-container {
            flex: 1;
            position: relative;
            background: rgba(0,0,0,0.4);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            margin-bottom: 20px;
        }

        canvas {
            height: 100% !important;
            width: 100% !important;
        }

        .controls {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 8px;
            z-index: 20;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 12px;
            backdrop-filter: blur(20px);
        }

        .timeframe-btn {
            padding: 8px 12px;
            font-size: 13px;
            min-width: 45px;
        }

        .timeframe-btn.active {
            background: linear-gradient(45deg, #00d4ff, #0099cc) !important;
            color: #000 !important;
            box-shadow: 0 4px 15px rgba(0,212,255,0.4);
        }

        .status {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 13px;
            backdrop-filter: blur(20px);
        }

        .signals-section {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            height: 160px;
        }

        .signal-card {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 16px;
            padding: 25px;
            backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .main-signal {
            grid-column: span 1;
            background: linear-gradient(135deg, rgba(0,212,255,0.15), rgba(91,139,245,0.15));
            border: 1px solid rgba(0,212,255,0.3);
        }

        .signal-header {
            font-size: 14px;
            opacity: 0.8;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 500;
        }

        .signal-text {
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 15px;
            line-height: 1.2;
        }

        .signal-strong-buy { 
            color: #00ff88; 
            text-shadow: 0 0 20px rgba(0,255,136,0.6); 
        }
        .signal-buy { color: #66ff99; }
        .signal-sell { color: #ff6666; }
        .signal-strong-sell { 
            color: #ff3333; 
            text-shadow: 0 0 20px rgba(255,51,51,0.6); 
        }
        .signal-neutral { 
            color: #ffeb3b; 
            text-shadow: 0 0 10px rgba(255,235,59,0.5);
        }

        .metrics {
            display: flex;
            gap: 30px;
        }

        .metric {
            text-align: center;
        }

        .metric-value {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .metric-label {
            font-size: 12px;
            opacity: 0.7;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .indicators-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 15px;
        }

        .indicator {
            text-align: center;
            padding: 12px;
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
        }

        .indicator-value {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .indicator-label {
            font-size: 11px;
            opacity: 0.7;
        }

        @media (max-width: 768px) {
            .container { padding: 15px; }
            .signals-section { 
                grid-template-columns: 1fr; 
                height: auto;
                gap: 15px;
            }
            .header { flex-direction: column; align-items: flex-start; gap: 20px; }
            .pair-info { align-items: flex-start; }
            .controls { 
                position: relative;
                top: auto;
                right: auto;
                bottom: auto;
                left: auto;
                margin-top: 15px;
                justify-content: center;
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">⚡ Sigmora Lite</div>
            <div class="pair-info">
                <div class="pair-selector">
                    <select id="symbolSelect">
                        <option value="BTCUSDT">BTC/USDT</option>
                        <option value="ETHUSDT">ETH/USDT</option>
                        <option value="BNBUSDT">BNB/USDT</option>
                        <option value="ADAUSDT">ADA/USDT</option>
                        <option value="SOLUSDT">SOL/USDT</option>
                    </select>
                    <div class="live-price" id="currentPrice">-</div>
                    <div class="price-change" id="priceChange">-</div>
                </div>
            </div>
        </div>

        <div class="chart-container">
            <div class="controls" id="timeframeControls">
                <button class="timeframe-btn active" data-interval="1m">1m</button>
                <button class="timeframe-btn" data-interval="5m">5m</button>
                <button class="timeframe-btn" data-interval="15m">15m</button>
                <button class="timeframe-btn" data-interval="1h">1h</button>
            </div>
            <canvas id="candlestickChart"></canvas>
            <div class="status" id="statusIndicator">
                🔄 Loading live data...
            </div>
        </div>

        <div class="signals-section">
            <div class="signal-card main-signal">
                <div class="signal-header">AI Trading Signal</div>
                <div class="signal-text signal-neutral" id="mainSignal">WAIT</div>
                <div class="metrics">
                    <div class="metric">
                        <div class="metric-value" id="confidence">0%</div>
                        <div class="metric-label">Confidence</div>
                    </div>
                    <div class="metric">
                        <div class="metric-value" id="riskLevel">Medium</div>
                        <div class="metric-label">Risk</div>
                    </div>
                </div>
            </div>

            <div class="signal-card">
                <div class="signal-header">Live Indicators</div>
                <div class="indicators-grid" id="indicators">
                    <!-- Dynamic indicators -->
                </div>
            </div>
        </div>
    </div>

    <script>
        class SigmoraLite {
            constructor() {
                this.symbol = 'BTCUSDT';
                this.interval = '1m';
                this.candles = [];
                this.chart = null;
                this.lastPrice = 0;
                this.init();
            }

            init() {
                this.setupEventListeners();
                this.createChart();
                this.loadInitialData();
                this.startLiveUpdates();
            }

            setupEventListeners() {
                // Symbol change
                document.getElementById('symbolSelect').addEventListener('change', (e) => {
                    this.symbol = e.target.value;
                    this.loadInitialData();
                });

                // Timeframe change
                document.querySelectorAll('.timeframe-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        document.querySelector('.timeframe-btn.active').classList.remove('active');
                        e.target.classList.add('active');
                        this.interval = e.target.dataset.interval;
                        this.loadInitialData();
                    });
                });
            }

            createChart() {
                const ctx = document.getElementById('candlestickChart').getContext('2d');
                
                this.chart = new Chart(ctx, {
                    type: 'candlestick',
                    data: {
                        datasets: [{
                            label: `${this.symbol} Price`,
                            data: [],
                            borderColor: '#00d4ff',
                            backgroundColor: {
                                up: '#00ff88AA',
                                down: '#ff4444AA',
                                unchanged: '#666666AA'
                            },
                            borderWidth: 1
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        interaction: {
                            intersect: false,
                            mode: 'index'
                        },
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                backgroundColor: 'rgba(20,20,40,0.95)',
                                titleColor: '#fff',
                                bodyColor: '#e0e0e0',
                                borderColor: '#00d4ff',
                                borderWidth: 1,
                                cornerRadius: 8,
                                displayColors: false,
                                callbacks: {
                                    title: (ctx) => `Price: $${ctx[0].parsed.c.toFixed(4)}`,
                                    label: (ctx) => {
                                        const candle = ctx.raw;
                                        return [
                                            `Open: $${candle.o.toFixed(4)}`,
                                            `High: $${candle.h.toFixed(4)}`,
                                            `Low: $${candle.l.toFixed(4)}`,
                                            `Close: $${candle.c.toFixed(4)}`
                                        ];
                                    }
                                }
                            }
                        },
                        scales: {
                            x: {
                                type: 'time',
                                time: {
                                    unit: this.interval === '1h' ? 'hour' : 'minute',
                                    displayFormats: {
                                        minute: 'HH:mm',
                                        hour: 'MMM dd HH:mm'
                                    }
                                },
                                grid: {
                                    color: 'rgba(255,255,255,0.1)',
                                    lineWidth: 1
                                },
                                ticks: {
                                    color: '#b0b0b0'
                                }
                            },
                            y: {
                                grid: {
                                    color: 'rgba(255,255,255,0.05)'
                                },
                                ticks: {
                                    color: '#b0b0b0',
                                    callback: (value) => `$${value.toFixed(2)}`
                                }
                            }
                        },
                        animation: {
                            duration: 0
                        }
                    }
                });
            }

            async loadInitialData() {
                try {
                    this.setStatus('📊 Loading chart data...', 'loading');
                    
                    const limit = this.interval === '1h' ? 150 : 200;
                    const response = await fetch(
                        `https://api.binance.com/api/v3/klines?symbol=${this.symbol}&interval=${this.interval}&limit=${limit}`
                    );
                    
                    if (!response.ok) throw new Error('API rate limit');
                    
                    const klines = await response.json();
                    this.processKlines(klines);
                    
                    this.setStatus(`✅ Live data for ${this.symbol} ${this.interval}`, 'success');
                    
                } catch (error) {
                    console.error('Initial load error:', error);
                    this.setStatus('❌ Connection error, retrying...', 'error');
                    setTimeout(() => this.loadInitialData(), 3000);
                }
            }

            async startLiveUpdates() {
                // Update every 10 seconds
                setInterval(() => {
                    this.updateLiveData();
                }, 10000);
            }

            async updateLiveData() {
                try {
                    const response = await fetch(
                        `https://api.binance.com/api/v3/klines?symbol=${this.symbol}&interval=${this.interval}&limit=2`
                    );
                    
                    const klines = await response.json();
                    const newCandle = this.processSingleKline(klines[0]);
                    
                    // Add new candle if it's different from last
                    if (this.candles.length === 0 || 
                        this.candles[this.candles.length - 1].x !== newCandle.x) {
                        this.candles.push(newCandle);
                        
                        // Keep only last 150 candles
                        if (this.candles.length > 150) {
                            this.candles.shift();
                        }
                    } else {
                        // Update current candle
                        this.candles[this.candles.length - 1] = newCandle;
                    }
                    
                    this.updateChart();
                    this.updatePriceDisplay();
                    this.calculateAndDisplaySignals();
                    
                } catch (error) {
                    console.error('Live update error:', error);
                }
            }

            processKlines(klines) {
                this.candles = klines.map(kline => ({
                    x: parseInt(kline[0]), // timestamp
                    o: parseFloat(kline[1]), // open
                    h: parseFloat(kline[2]), // high
                    l: parseFloat(kline[3]), // low
                    c: parseFloat(kline[4]), // close
                    v: parseFloat(kline[5])  // volume
                })).slice(-150);
                
                this.updateChart();
                this.updatePriceDisplay();
                this.calculateAndDisplaySignals();
            }

            processSingleKline(kline) {
                return {
                    x: parseInt(kline[0]),
                    o: parseFloat(kline[1]),
                    h: parseFloat(kline[2]),
                    l: parseFloat(kline[3]),
                    c: parseFloat(kline[4]),
                    v: parseFloat(kline[5])
                };
            }

            updateChart() {
                if (this.chart && this.candles.length > 0) {
                    this.chart.data.datasets[0].data = this.candles;
                    this.chart.update('none');
                }
            }

            updatePriceDisplay() {
                if (this.candles.length === 0) return;
                
                const current = this.candles[this.candles.length - 1];
                const previous = this.candles[this.candles.length - 2];
                
                document.getElementById('currentPrice').textContent = 
                    `$${current.c.toFixed(4)}`;
                
                if (previous) {
                    const changePercent = ((current.c - previous.c) / previous.c) * 100;
                    const changeEl = document.getElementById('priceChange');
                    changeEl.textContent = `${changePercent >= 0 ? '+' : ''}${changePercent.toFixed(2)}%`;
                    changeEl.className = `price-change ${changePercent >= 0 ? 'price-up' : 'price-down'}`;
                }
            }

            calculateAndDisplaySignals() {
                if (this.candles.length < 50) return;
                
                const closes = this.candles.map(c => c.c);
                const indicators = this.calculateTechn
