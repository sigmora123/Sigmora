<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sigmora - Professional Trading Signals</title>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <script src="https://s3.tradingview.com/tv.js"></script>
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --shadow: 0 25px 50px rgba(0, 0, 0, 0.25);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: radial-gradient(ellipse at top, #0a0a23 0%, #000000 70%);
            color: #ffffff;
            min-height: 100vh;
            line-height: 1.6;
        }

        .container {
            max-width: 1440px;
            margin: 0 auto;
            padding: 24px;
            min-height: 100vh;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 800;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
        }

        .tagline {
            color: #9ca3af;
            font-size: 1.1rem;
            font-weight: 400;
        }

        /* Status Bar */
        .status-bar {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 16px 24px;
            margin-bottom: 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .status-live { background: var(--success); }
        .status-updating { background: var(--warning); }

        /* Main Dashboard */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 32px;
            margin-bottom: 32px;
        }

        .main-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            padding: 32px;
            box-shadow: var(--shadow);
        }

        /* Pair Selector */
        .pair-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 32px;
            justify-content: center;
        }

        .pair-btn {
            padding: 12px 24px;
            border: 2px solid transparent;
            border-radius: 50px;
            background: transparent;
            color: #e5e7eb;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .pair-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: var(--primary-gradient);
            opacity: 0.2;
            transition: left 0.5s;
        }

        .pair-btn:hover::before {
            left: 0;
        }

        .pair-btn:hover {
            border-color: #60a5fa;
            color: #ffffff;
            transform: translateY(-2px);
        }

        .pair-btn.active {
            background: var(--primary-gradient);
            border-color: transparent;
            color: white;
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }

        /* Chart Container */
        .chart-container {
            height: 500px;
            border-radius: 20px;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.4);
            margin-bottom: 32px;
            position: relative;
        }

        /* Timeframe Analysis */
        .timeframe-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .timeframe-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 24px;
            text-align: center;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .timeframe-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--primary-gradient);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .timeframe-card:hover::before {
            opacity: 1;
        }

        .timeframe-card:hover {
            transform: translateY(-4px);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .tf-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .tf-timeframe {
            font-size: 0.85rem;
            color: #9ca3af;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .signal-badge {
            font-size: 1.4rem;
            font-weight: 700;
            padding: 12px 20px;
            border-radius: 16px;
            margin: 12px 0;
            position: relative;
            overflow: hidden;
        }

        .signal-buy { 
            background: rgba(16, 185, 129, 0.15);
            color: var(--success);
            border: 2px solid rgba(16, 185, 129, 0.3);
        }

        .signal-strong-buy { 
            background: rgba(16, 185, 129, 0.25);
            color: var(--success);
            border: 2px solid var(--success);
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.3);
        }

        .signal-sell { 
            background: rgba(239, 68, 68, 0.15);
            color: var(--danger);
            border: 2px solid rgba(239, 68, 68, 0.3);
        }

        .signal-strong-sell { 
            background: rgba(239, 68, 68, 0.25);
            color: var(--danger);
            border: 2px solid var(--danger);
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.3);
        }

        .signal-neutral { 
            background: rgba(245, 158, 11, 0.15);
            color: var(--warning);
            border: 2px solid rgba(245, 158, 11, 0.3);
        }

        .confidence-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
            margin: 12px 0;
        }

        .confidence-fill {
            height: 100%;
            background: var(--primary-gradient);
            border-radius: 4px;
            transition: width 1s ease;
        }

        .confidence-text {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .risk-badge {
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        /* Sidebar */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .panel {
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            padding: 28px;
            box-shadow: var(--shadow);
        }

        .panel-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #f8fafc;
        }

        /* Scanner */
        .scanner-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .scanner-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 12px;
            margin-bottom: 12px;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .scanner-item:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateX(4px);
        }

        /* History */
        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 10px;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .outcome-win {
            color: var(--success);
            font-weight: 700;
        }

        .outcome-loss {
            color: var(--danger);
            font-weight: 700;
        }

        /* Loading */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 20px;
            z-index: 10;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #60a5fa;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 16px;
            }
            
            .status-bar {
                flex-direction: column;
                text-align: center;
            }
            
            .pair-selector {
                justify-content: flex-start;
            }
            
            .chart-container {
                height: 400px;
            }
        }

        @media (max-width: 480px) {
            .timeframe-grid {
                grid-template-columns: 1fr;
            }
            
            .main-panel, .panel {
                padding: 20px;
            }
        }

        /* Scrollbar */
        .scanner-list::-webkit-scrollbar {
            width: 6px;
        }

        .scanner-list::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 3px;
        }

        .scanner-list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Status Bar -->
        <div class="status-bar">
            <div class="status-item">
                <div class="status-dot status-live"></div>
                <span>Live Market Data</span>
            </div>

                <span id="lastUpdate">Last update: --:--:--</span>

                <div class="pair-selector" id="pairSelector"></div>

                <!-- Chart -->
                <div class="chart-container" id="chartContainer">
                    <div class="loading-overlay" id="chartLoading">
                        <div class="spinner"></div>
                        <div>Loading chart...</div>
                    </div>
                </div>

                <!-- Timeframe Analysis -->
                <div class="timeframe-grid" id="timeframeAnalysis"></div>
            </div>

            <div class="sidebar">

                <div class="panel">

                <!-- Signal History -->
                <div class="panel">

                </div>
            </div>
        </div>
    </div>

    <script>
        class SigmoraPro {

                this.pairs = [

                    { symbol: 'ETHUSDT', display: 'ETH/USDT' },
                    { symbol: 'EURUSD', display: 'EUR/USD' },
                    { symbol: 'XAUUSD', display: 'GOLD (XAUUSD)' },
                    { symbol: 'USDJPY', display: 'USD/JPY' }
                ];
                this.selectedPair = this.pairs[0];
                this.timeframes = ['1m', '5m', '15m', '1h'];
                this.allSignals = {};
                this.history = this.loadHistory();
                this.updateInterval = null;
                this.countdownInterval = null;
                this.init();
            }

            init() {
                this.renderPairSelector();
                this.startUpdateCycle();
                this.loadChart();
            }

            renderPairSelector() {
                const container = document.getElementById('pairSelector');
                this.pairs.forEach((pair, index) => {
                    const btn = document.createElement('button');
                    btn.className = 'pair-btn';
                    btn.textContent = pair.display;
                    btn.dataset.symbol = pair.symbol;
                    btn.onclick = () => this.selectPair(pair);
                    container.appendChild(btn);
                });
                // Activate first pair
                container.children[0].classList.add('active');
            }

            selectPair(pair) {
                this.selectedPair = pair;
                document.querySelectorAll('.pair-btn').forEach(btn => btn.classList.remove('active'));
                event.target.classList.add('active');
                this.loadChart();
            }

            async loadChart() {
                const container = document.getElementById('chartContainer');
                const loading = document.getElementById('chartLoading');
                
                loading.style.display = 'flex';
                
                // Clear previous widget
                if (window.tvWidget) {
                    window.tvWidget.remove();
                    window.tvWidget = null;
                }

                setTimeout(() => {
                    try {
                        window.tvWidget = new TradingView.widget({
                            container_id: 'chartContainer',
                            width: '100%',
                            height: '100%',
                            symbol: this.selectedPair.symbol,
                            interval: '5',
                            timezone: 'Etc/UTC',
                            theme: 'dark',
                            style: '1',
                            locale: 'en',
                            toolbar_bg: 'rgba(0,0,0,0.8)',
                            enable_publishing: false,
                            hide_top_toolbar: false,
                            symbol_info: {
                                'ticker': this.selectedPair.symbol,
                                'name': this.selectedPair.display,
                                'description': this.selectedPair.display,
                                'type': 'crypto' // Adjust based on pair
                            }
                        });
                        
                        loading.style.display = 'none';
                    } catch (error) {
                        console.error('Chart load error:', error);
                        loading.innerHTML = '<div class="spinner"></div><div>Chart loading...</div>';
                    }
                }, 500);
            }

            startUpdateCycle() {
                this.updateSignals();
                this.updateCountdown();
                this.countdownInterval = setInterval(() => this.updateCountdown(), 1000);
                this.updateInterval = setInterval(() => this.updateSignals(), 10000);
            }

            updateCountdown() {
                const countdown = document.getElementById('countdown');
                const time = parseInt(countdown.textContent);
                if (time <= 1) {
                    countdown.textContent = '10';
                } else {
                    countdown.textContent = (time - 1).toString();
                }
            }

            async updateSignals() {
                document.getElementById('lastUpdate').textContent = `Last update: ${new Date().toLocaleTimeString()}`;
                
                // Simulate real-time market analysis
                this.calculateRealisticSignals();
                this.renderTimeframeAnalysis();
                this.renderScanner();
                this.updateHistory();
            }

                const now = Date.now() / 1000;

                this.pairs.forEach(pair => {
                    this.allSignals[pair.symbol] = {};
                    
                    this.timeframes.forEach(tf => {
                        const signal = this.analyzeMarket(pair.symbol, tf, now);
                        this.allSignals[pair.symbol][tf] = signal;
                    });
                });
            }
