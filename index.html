<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sigmora Pro - Professional Trading Platform</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            height: 100vh;
            overflow: hidden;
        }

        .top-bar {
            background: linear-gradient(90deg, #1a1a2e, #16213e);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
            font-size: 18px;
            font-weight: bold;
        }

        .price-display {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .price-change.positive { color: #00ff88; }
        .price-change.negative { color: #ff4444; }

        .container {
            display: flex;
            height: calc(100vh - 50px);
        }

        .left-panel {
            width: 280px;
            background: #111;
            border-right: 1px solid #333;
            overflow-y: auto;
        }

        .market-watch {
            padding: 15px;
        }

        .pair-item {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            margin-bottom: 8px;
            background: #1a1a1a;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .pair-item:hover {
            background: #2a2a2a;
            border-color: #444;
        }

        .pair-item.active {
            background: #0f4c75;
            border-color: #00aaff;
        }

        .pair-name { font-weight: 500; }
        .pair-price { font-size: 14px; font-weight: bold; }
        .pair-change { font-size: 12px; }

        .main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .chart-container {
            flex: 1;
            position: relative;
            background: #000;
            overflow: hidden;
        }

        .chart-controls {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 10;
        }

        .timeframe-btn {
            background: #2a2a2a;
            color: white;
            border: none;
            padding: 8px 12px;
            margin-right: 5px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .timeframe-btn.active {
            background: #00aaff;
        }

        #chartCanvas {
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }

        .bottom-panel {
            height: 200px;
            background: #1a1a1a;
            border-top: 1px solid #333;
            padding: 15px;
            overflow-y: auto;
        }

        .indicators-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .indicator-card {
            background: #2a2a2a;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #444;
        }

        .indicator-title {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .indicator-value {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .indicator-status {
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 12px;
        }

        .status-bull { background: rgba(0, 255, 136, 0.2); color: #00ff88; }
        .status-bear { background: rgba(255, 68, 68, 0.2); color: #ff4444; }
        .status-neutral { background: rgba(255, 193, 7, 0.2); color: #ffc107; }

        .right-panel {
            width: 300px;
            background: #111;
            border-left: 1px solid #333;
            padding: 20px;
        }

        .signal-card {
            background: linear-gradient(145deg, #0f4c75, #1a237e);
            border-radius: 12px;
            padding: 25px;
            text-align: center;
            margin-bottom: 20px;
        }

        .signal-text {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .signal-strong { color: #00ff88; }
        .signal-buy { color: #90ee90; }
        .signal-sell { color: #ff9999; }
        .signal-strong-sell { color: #ff4444; }
        .signal-wait { color: #ffc107; }

        .confidence {
            font-size: 18px;
            margin-bottom: 10px;
        }

        .risk-badge {
            font-size: 14px;
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: bold;
        }

        .risk-low { background: rgba(0, 255, 136, 0.3); color: #00ff88; }
        .risk-medium { background: rgba(255, 193, 7, 0.3); color: #ffc107; }
        .risk-high { background: rgba(255, 68, 68, 0.3); color: #ff4444; }

        .scanner {
            background: #1a1a1a;
            border-radius: 8px;
            padding: 15px;
        }

        .scanner-title {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 10px;
        }

        .scanner-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #333;
        }

        .scanner-highlight {
            background: rgba(0, 255, 136, 0.1) !important;
            border-left: 4px solid #00ff88;
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="price-display">
            <span id="currentPair">BTC/USDT</span>
            <span id="currentPrice" class="price-change positive">67,450.23</span>
            <span id="priceChange" class="price-change positive">+2.34%</span>
        </div>
        <div>🔄 Auto Update: <span id="updateStatus">Active</span></div>
    </div>

    <div class="container">
        <div class="left-panel">
            <div class="market-watch">
                <div class="pair-item active" data-pair="BTC/USDT">
                    <div>
                        <div class="pair-name">BTC/USDT</div>
                        <div class="pair-price">67,450.23</div>
                    </div>
                    <div class="pair-change positive">+2.34%</div>
                </div>
                <div class="pair-item" data-pair="ETH/USDT">
                    <div>
                        <div class="pair-name">ETH/USDT</div>
                        <div class="pair-price">3,245.67</div>
                    </div>
                    <div class="pair-change positive">+1.89%</div>
                </div>
                <div class="pair-item" data-pair="EUR/USD">
                    <div>
                        <div class="pair-name">EUR/USD</div>
                        <div class="pair-price">1.0895</div>
                    </div>
                    <div class="pair-change negative">-0.23%</div>
                </div>
                <div class="pair-item" data-pair="USD/JPY">
                    <div>
                        <div class="pair-name">USD/JPY</div>
                        <div class="pair-price">151.23</div>
                    </div>
                    <div class="pair-change positive">+0.45%</div>
                </div>
                <div class="pair-item" data-pair="XAU/USD">
                    <div>
                        <div class="pair-name">GOLD</div>
                        <div class="pair-price">2,345.67</div>
                    </div>
                    <div class="pair-change positive">+1.12%</div>
                </div>
            </div>
        </div>

        <div class="main-area">
            <div class="chart-container">
                <div class="chart-controls">
                    <button class="timeframe-btn active" data-tf="1m">1m</button>
                    <button class="timeframe-btn" data-tf="5m">5m</button>
                    <button class="timeframe-btn" data-tf="15m">15m</button>
                    <button class="timeframe-btn" data-tf="1h">1H</button>
                </div>
                <canvas id="chartCanvas"></canvas>
            </div>

            <div class="bottom-panel">
                <div class="indicators-grid" id="indicators">
                    <!-- Indicators will be populated by JS -->
                </div>
            </div>
        </div>

        <div class="right-panel">
            <div class="signal-card">
                <div class="signal-text signal-strong" id="mainSignal">STRONG BUY</div>
                <div class="confidence">Confidence: <span id="confidence">92%</span></div>
                <div class="risk-badge risk-low" id="riskLevel">LOW RISK</div>
            </div>

            <div class="scanner">
                <div class="scanner-title">Live Scanner</div>
                <div id="scannerList">
                    <!-- Scanner items populated by JS -->
                </div>
            </div>
        </div>
    </div>

    <script>
        class SigmoraPro {
            constructor() {
                this.currentPair = 'BTC/USDT';
                this.timeframe = '1m';
                this.candles = [];
                this.indicators = {};
                this.signals = {};
                this.canvas = null;
                this.ctx = null;
                this.init();
            }

            init() {
                this.canvas = document.getElementById('chartCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.resizeCanvas();
                window.addEventListener('resize', () => this.resizeCanvas());

                this.setupEventListeners();
                this.generateInitialData();
                this.updateLoop();
            }

            resizeCanvas() {
                const rect = this.canvas.getBoundingClientRect();
                this.canvas.width = rect.width;
                this.canvas.height = rect.height;
            }

            setupEventListeners() {
                // Pair selection
                document.querySelectorAll('.pair-item').forEach(item => {
                    item.addEventListener('click', (e) => {
                        document.querySelectorAll('.pair-item').forEach(i => i.classList.remove('active'));
                        item.classList.add('active');
                        this.currentPair = item.dataset.pair;
                        document.getElementById('currentPair').textContent = this.currentPair;
                        this.generateInitialData();
                        this.updateChart();
                    });
                });

                // Timeframe buttons
                document.querySelectorAll('.timeframe-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        document.querySelectorAll('.timeframe-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        this.timeframe = btn.dataset.tf;
                        this.generateInitialData();
                        this.updateChart();
                    });
                });
            }

            generateInitialData() {
                this.candles = [];
                const candleCount = this.timeframe === '1m' ? 100 : this.timeframe === '5m' ? 80 : this.timeframe === '15m' ? 60 : 40;
                let price = this.getBasePrice();
                let trend = Math.random() > 0.5 ? 1 : -1;

                for (let i = 0; i < candleCount; i++) {
                    const change = (Math.random() - 0.5) * 0.02 * trend;
                    price *= (1 + change);
                    const high = price * (1 + Math.random() * 0.01);
                    const low = price * (1 - Math.random() * 0.01);
                    const open = price * (0.99 + Math.random() * 0.02);
                    const close = price;

                    this.candles.push({
                        open, high, low, close,
                        time: Date.now() - (candleCount - i) * (this.timeframe === '1m' ? 60000 : this.timeframe === '5m' ? 300000 : this.timeframe === '15m' ? 900000 : 3600000),
                        volume: Math.random() * 1000 + 500
                    });

                    if (Math.random() > 0.9) trend *= -1;
                }
            }

            getBasePrice() {
                const prices = {
                    'BTC/USDT': 67450,
                    'ETH/USDT': 3245,
                    'EUR/USD': 1.0895,
                    'USD/JPY': 151.23,
                    'XAU/USD': 2345.67
                };
                return prices[this.currentPair] || 10000;
            }

            updateLoop() {
                this.updateMarketData();
                this.calculateIndicators();
                this.generateSignal();
                this.updateChart();
                this.updateUI();
                setTimeout(() => this.updateLoop(), 5000);
            }

            updateMarketData() {
                // Update current price
                const basePrice = this.candles[this.candles.length - 1]?.close || this.getBasePrice();
                const change = (Math.random() - 0.5) * 0.015;
                const newPrice = basePrice * (1 + change);

                // Add new candle
                const lastCandle = this.candles[this.candles.length - 1];
                this.candles.push({
                    open: lastCandle?.close || basePrice,
                    high: Math.max(newPrice, basePrice * 1.002),
                    low: Math.min(newPrice, basePrice * 0.998),
                    close: newPrice,
                    time: Date.now(),
                    volume: Math.random() * 1200 + 600
                });

                // Keep only recent candles
                if (this.candles.length > 100) {
                    this.candles.shift();
                }

                document.getElementById('currentPrice').textContent = newPrice.toLocaleString(undefined, {maximumFractionDigits: 2});
                const changePercent = ((newPrice - basePrice) / basePrice * 100).toFixed(2);
                document.getElementById('priceChange').textContent = changePercent + '%';
                document.getElementById('priceChange').className = `price-change ${changePercent > 0 ? 'positive' : 'negative'}`;
            }

            calculateIndicators() {
                const closes = this.candles.map(c => c.close);
                const periods = {
                    rsi: 14,
                    emaFast: 12,
                    emaSlow: 26,
                    sma: 20
                };

                // RSI
                let gains = 0, losses = 0;
                for (let i = closes.length - periods.rsi - 1; i < closes.length; i++) {
                    const change = closes[i + 1] - closes[i];
                    if (change > 0) gains += change;
                    else losses -= change;
                }
                const avgGain = gains / periods.rsi;
                const avgLoss = losses / periods.rsi;
                const rs = avgGain / avgLoss;
                this.indicators.rsi = Math.min(100, Math.max(0, 100 - (100 / (1 + rs))));

                // MACD
                const emaFast = this.ema(closes, periods.emaFast);
                const emaSlow = this.ema(closes, periods.emaSlow);
                this.indicators.macd = emaFast - emaSlow;

                // Trends
                this.indicators.emaTrend = closes[closes.length - 1] > emaFast ? 'Bullish' : 'Bearish';
                this.indicators.smaTrend = closes[closes.length - 1] > this.sma(closes, periods.sma) ? 'Bullish' : 'Bearish';

                // Volume
                this.indicators.volume = this.candles[this.candles.length - 1].volume > this.avgVolume() ? 'High' : 'Normal';

                // Bollinger Bands
                const bbMiddle = this.sma(closes, 20);
                const bbStd = this.standardDeviation(closes.slice(-20), bbMiddle);
                const bbUpper = bbMiddle + (bbStd * 2);
                const bbLower = bbMiddle - (bbStd * 2);
                this.indicators.bbStatus = closes[closes.length - 1] > bbUpper ? 'Overbought' : closes[closes.length - 1] < bbLower ? 'Oversold' : 'Normal';

                // Overall trend
                this.indicators.trend = (this.indicators.emaTrend === 'Bullish' && this.indicators.smaTrend === 'Bullish') ? 'Bullish' : 'Bearish';
            }

            ema(data, period) {
                const multiplier = 2 / (period + 1);
                let ema = data[0];
                for (let i = 1; i < data.length; i++) {
                    ema = (data[i] * multiplier) + (ema * (1 - multiplier));
                }
                return ema;
            }

            sma(data, period) {
                const slice = data.slice(-period);
                return slice.reduce((a, b) => a + b) / period;
            }

            avgVolume() {
                return this.candles.slice(-20).reduce((sum, c) => sum + c.volume, 0) / 20;
            }

            standardDeviation(data, mean) {
                const variance = data.reduce((sum, val) => sum + Math.pow(val - mean, 2), 0) / data.length;
                return Math.sqrt(variance);
            }

            generateSignal() {
                const bullishSignals = 0;
                let signals = 0;

                // Count bullish signals
                if (this.indicators.rsi < 70 && this.indicators.rsi > 30) signals++;
                if (this.indicators.macd > 0) { signals++; bullishSignals++; }
                if (this.indicators.emaTrend === 'Bullish') { signals++; bullishSignals++; }
                if (this.indicators.smaTrend === 'Bullish') { signals++; bullishSignals++; }
                if (this.indicators.bbStatus !== 'Overbought') signals++;
                if (this.indicators.volume === 'High') { signals++; bullishSignals++; }
                if (this.indicators.trend === 'Bullish') { signals++; bullishSignals++; }

                const strength = bullishSignals / signals;
                const confidence = Math.floor(70 + Math.random() * 25);

                let signal;
                if (strength > 0.75) signal = 'STRONG BUY';
                else if (strength > 0.6) signal = 'BUY';
                else if (strength < 0.25) signal = 'STRONG SELL';
                else if (strength < 0.4) signal = 'SELL';
                else signal = 'WAIT';

                this.signals.main = signal;
                this.signals.confidence = confidence;
                this.signals.risk = confidence > 85 ? 'Low' : confidence > 75 ? 'Medium' : 'High';
            }

            updateChart() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                
                const candleWidth = Math.max(4, this.canvas.width / this.candles.length);
                const visibleCandles = Math.min(this.candles.length, Math.floor(this.canvas.width / candleWidth));

                // Find price range
                const prices = this.candles.slice(-visibleCandles).flatMap(c => [c.high, c.low]);
                const maxPrice = Math.max(...prices);
                const minPrice = Math.min(...prices);
                const priceRange = maxPrice - minPrice;
                const padding = priceRange * 0.05;

                this.candles.slice(-visibleCandles).forEach((candle, i) => {
                    const x
